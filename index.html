<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Question For You ❤️</title>

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
overflow:hidden;
text-align:center;
color:white;
}

.container{
margin-top:40px;
position:relative;
z-index:2;
}

h1{
font-size:3em;
margin-bottom:10px;
}

#typing{
font-size:1.4em;
min-height:40px;
width:80%;
margin:auto;
}

img{
width:240px;
border-radius:20px;
margin-top:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.4);
transition:0.4s;
}

img:hover{
transform:scale(1.05);
}

.buttons{
margin-top:40px;
}

button{
padding:15px 35px;
font-size:20px;
border:none;
border-radius:40px;
cursor:pointer;
margin:10px;
transition:0.25s;
}

#yes{
background:#ff2e63;
color:white;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

#yes:hover{
transform:scale(1.1);
}

#no{
background:white;
}

#message{
font-size:32px;
margin-top:30px;
font-weight:bold;
}

.heart{
position:absolute;
color:white;
font-size:20px;
animation:float 8s linear infinite;
opacity:0.8;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

.confetti{
position:absolute;
width:10px;
height:10px;
animation:fall 3s linear forwards;
}

@keyframes fall{
0%{transform:translateY(-20px);}
100%{transform:translateY(100vh);}
}

</style>

</head>

<body>

<!-- Background music -->

<audio id="music" autoplay loop>
<source src="song.mp3" type="audio/mpeg">
</audio>

<div class="container">

<h1>HIIIIIIII CUTUUUUUUUUUUUUUUU </h1>

<div id="typing"></div>

<img src="her.jpg">

<h2 style="margin-top:30px">
Will you be my <b>model for life</b> 📸  
and let me be your <b>cameraman forever</b>?
</h2>

<div class="buttons">
<button id="yes">YES ❤️</button>
<button id="no">NO 🙈</button>
</div>

<div id="message"></div>

</div>

<script>

const text="I HAVE STARTED TO SMILE A BIT MORE SINCE CAME MA PUNTUUUU";
let i=0;

function type(){
if(i<text.length){
document.getElementById("typing").innerHTML+=text.charAt(i);
i++;
setTimeout(type,40);
}
}
type();

const yes=document.getElementById("yes");
const no=document.getElementById("no");
const message=document.getElementById("message");
const music=document.getElementById("music");

yes.onclick=()=>{

music.currentTime=0;
music.play();

message.innerHTML="I LOVE U CUTU ❤️📸";

for(let i=0;i<180;i++){

let conf=document.createElement("div");

conf.className="confetti";

conf.style.left=Math.random()*100+"vw";

conf.style.background=`hsl(${Math.random()*360},100%,70%)`;

document.body.appendChild(conf);

}

};

let attempts=0;

function moveNo(){

attempts++;

let x=Math.random()*(window.innerWidth-120);
let y=Math.random()*(window.innerHeight-60);

no.style.position="absolute";
no.style.left=x+"px";
no.style.top=y+"px";

if(attempts>5){
no.innerHTML="Are you sure 😳";
}

if(attempts>8){
no.innerHTML="Fine YES ❤️";
}

if(attempts>10){
yes.click();
}

}

no.addEventListener("mouseover",moveNo);
no.addEventListener("click",moveNo);

function createHeart(){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(Math.random()*20+10)+"px";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),8000);

}

setInterval(createHeart,300);

</script>

</body>
</html>
