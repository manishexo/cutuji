<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Question For You ❤️</title>

<style>
body{
    font-family: 'Comic Sans MS', cursive;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    text-align:center;
    overflow:hidden;
}

.container{
    margin-top:50px;
}

h1{
    font-size:2.5em;
    color:white;
}

p{
    font-size:1.3em;
    color:white;
}

img{
    width:220px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    margin-top:15px;
}

.buttons{
    margin-top:40px;
}

button{
    font-size:20px;
    padding:15px 30px;
    margin:10px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    transition:0.3s;
}

#yes{
    background:#ff4d6d;
    color:white;
}

#no{
    background:white;
}

#message{
    font-size:26px;
    color:white;
    margin-top:30px;
}
</style>
</head>

<body>

<div class="container">

<h1>Hey Beautiful 💖</h1>

<img src="HER_PHOTO_HERE.jpg">

<p>
Life is like a camera 📸 <br>
You focus on the good moments <br>
Capture memories <br>
And develop something beautiful
</p>

<h2>
Will you be my <b>model for life</b>  
while I become your <b>cameraman</b>? 🥺
</h2>

<div class="buttons">
<button id="yes">Yes ❤️</button>
<button id="no">No 🙈</button>
</div>

<div id="message"></div>

</div>

<script>

const yesBtn = document.getElementById("yes");
const noBtn = document.getElementById("no");
const message = document.getElementById("message");

yesBtn.onclick = () => {
    message.innerHTML = "YAYYY 💕 I promise to take care of my favorite model forever 📸❤️";
};

let noClicks = 0;

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("click", moveButton);

function moveButton(){

    noClicks++;

    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 100);

    noBtn.style.position = "absolute";
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    if(noClicks > 5){
        noBtn.innerHTML = "Okay Yes ❤️";
    }

    if(noClicks > 8){
        message.innerHTML = "You tried to say no too many times 😌 Destiny says YES ❤️";
        yesBtn.click();
    }
}

</script>

</body>
</html>
